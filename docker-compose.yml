services:
  onlyflix:
    build: .
    container_name: onlyflix
    ports:
      - "${PORT:-8080}:${PORT:-8080}"
    environment:
      - LOCAL_PATH=/media
      - AUTH_USER=${AUTH_USER}
      - AUTH_PASS=${AUTH_PASS}
      - PUBLIC_URL=${PUBLIC_URL:-https://only.atrasado.online}
      - HIDE_UNREADY=${HIDE_UNREADY:-false}
    volumes:
      - ${LOCAL_PATH}:/media:rw
      - ./.env:/app/.env
      - ./transcoded:/app/transcoded
      - ./data:/app/data
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
